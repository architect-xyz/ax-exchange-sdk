name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.93.0
          components: rustfmt, clippy

      - name: Format
        run: make fmt

      - name: Lint
        run: make lint

      - name: Check generated code is up to date
        run: git diff --exit-code

      - name: Build
        run: make build

      - name: Test
        run: make test

